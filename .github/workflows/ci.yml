name: CI - Validate Tasks and Workflows

# This CI workflow validates workflow files and generates/checks metadata manifests.
# 
# Jobs:
#   1. validate-workflows: Validates workflow JSON schema and DAG integrity
#   2. generate-manifests: Generates metadata files and validates they're committed
#   3. lint: Runs flake8, black, and isort on Python files
#
# Task validation happens implicitly during metadata generation - if metadata
# can be generated, the task is valid (correct syntax, decorator, structure).

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'tasks/**'
      - 'workflows/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [ main, develop ]

jobs:
  validate-workflows:
    name: Validate Workflows
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Validate all workflows
        run: |
          python scripts/validate_workflow.py --all
      
      - name: Report validation results
        if: failure()
        run: echo "❌ Workflow validation failed. Please fix the errors and try again."
  
  generate-manifests:
    name: Generate and Validate Manifests
    runs-on: ubuntu-latest
    needs: validate-workflows
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Generate metadata manifests
        run: |
          python scripts/generate_manifest.py
      
      - name: Commit updated manifests
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tasks/_metadata/ workflows/_metadata/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update metadata manifests [skip ci]"
            git push
            echo "✅ Metadata manifests updated and committed"
          else
            echo "✅ Manifests already up to date, nothing to commit"
          fi

      - name: Verify manifests are up to date
        if: github.event_name == 'push'
        run: |
          if ! git diff --quiet tasks/_metadata/ workflows/_metadata/; then
            echo "❌ Metadata manifests are out of date."
            echo "Please run 'python scripts/generate_manifest.py' locally and commit the updated manifests."
            git diff --name-only tasks/_metadata/ workflows/_metadata/
            exit 1
          fi
          echo "✅ Metadata manifests are up to date"
      
      - name: Upload manifests artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-manifests
          path: |
            tasks/_metadata/**/*.json
            workflows/_metadata/*.json
          retention-days: 30
  
  lint:
    name: Lint Python Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
      
      - name: Run flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 tasks/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          # Exit-zero treats all errors as warnings
          flake8 tasks/ scripts/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true
      
      - name: Check formatting with black
        run: |
          black --check tasks/ scripts/ || true
      
      - name: Check import sorting with isort
        run: |
          isort --check-only tasks/ scripts/ || true